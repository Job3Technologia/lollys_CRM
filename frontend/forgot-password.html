<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Lolly's Food Joint</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo">
                <img src="../lollys logo.jpg" alt="Lolly's Logo">
                <h1>Lolly's Food Joint</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li id="auth-btn"><a href="login.html" class="btn btn-login">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="container" style="padding: 150px 0; display: flex; justify-content: center;">
        <div class="card glass-panel" style="width: 100%; max-width: 450px; padding: 48px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-lock-open" style="font-size: 3rem; color: var(--accent-orange); margin-bottom: 20px;"></i>
                <h2 style="margin-bottom: 10px;">Forgot Password?</h2>
                <p style="color: var(--text-muted);">Enter your email address and we'll send you a link to reset your password.</p>
            </div>
            
            <form id="forgot-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" required placeholder="name@example.com">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Send Reset Link</button>
            </form>
            
            <div style="margin-top: 30px; text-align: center; font-size: 0.9rem;">
                Remember your password? <a href="login.html" style="color: var(--accent-orange); font-weight: 600;">Back to Login</a>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Mock functionality for now
            const email = document.getElementById('reset-email').value;
            alert(`If an account exists for ${email}, you will receive a password reset link shortly.`);
            // In a real app, call API endpoint: POST /api/auth/forgot-password
        });
    </script>
</body>
</html>
