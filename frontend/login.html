<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lolly's Food Joint</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo">
                <img src="../lollys logo.jpg" alt="Lolly's Logo">
                <h1>Lolly's Food Joint</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>
            <div class="burger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="container" style="padding: 150px 0; display: flex; justify-content: center;">
        <div class="card glass-panel" style="width: 100%; max-width: 450px; padding: 48px;">
            <h2 style="margin-bottom: 10px; text-align: center;">Welcome Back</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Login to start ordering your Durban favorites</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted);">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="forgot-password.html" style="color: var(--accent-orange); font-weight: 600; font-size: 0.9rem;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                
                <div style="margin-top: 20px; padding: 10px; background: rgba(249, 115, 22, 0.1); border-radius: 8px; font-size: 0.85rem; color: var(--text-muted); text-align: center;">
                    <strong>Demo Customer:</strong> user@lollys.co.za / password123
                </div>
            </form>
            
            <div style="margin-top: 30px; text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--accent-orange); font-weight: 600;">Sign Up</a>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('lollys_token', data.token);
                    localStorage.setItem('lollys_user', JSON.stringify(data.customer));
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                alert('Connection failed. Please try again.');
            }
        });
    </script>
</body>
</html>
