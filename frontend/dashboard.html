<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Lolly's Food Joint</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo">
                <img src="../lollys logo.jpg" alt="Lolly's Logo">
                <h1>Lolly's Food Joint</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>
            <div class="burger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="container" style="padding: 150px 20px;">
        <div style="margin-bottom: 40px;">
            <h1 id="user-welcome">Welcome back, User</h1>
            <p style="color: var(--text-muted);">Manage your account and track your orders</p>
        </div>

        <div id="edit-profile-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
            <div class="card glass-panel" style="width: 450px; max-width: 90%; padding: 30px; background: white;">
                <h3 style="margin-bottom: 20px;">Edit Profile</h3>
                <form id="edit-profile-form">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="edit-first" class="form-control" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="edit-last" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="edit-phone" class="form-control" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                        <button type="button" class="btn btn-secondary" onclick="closeEditProfile()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="grid-2" style="display: grid; grid-template-columns: 1fr 2fr; gap: 40px;">
            <aside>
                <div class="card glass-panel" style="padding: 30px;">
                    <h3>Profile Info</h3>
                    <div id="profile-details" style="margin-top: 20px;">
                        <!-- Profile details via JS -->
                    </div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" onclick="openEditProfile()">Edit Profile</button>
                </div>
            </aside>

            <main>
                <div class="card glass-panel" style="padding: 30px;">
                    <h3 style="margin-bottom: 20px;">My Recent Orders</h3>
                    <div id="user-orders" class="data-table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Order #</th>
                                    <th>Date</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="user-orders-body">
                                <!-- Orders via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script>
        function openEditProfile() {
            const user = JSON.parse(localStorage.getItem('lollys_user'));
            const names = user.name.split(' ');
            document.getElementById('edit-first').value = names[0];
            document.getElementById('edit-last').value = names.slice(1).join(' ') || '';
            document.getElementById('edit-phone').value = user.phone;
            document.getElementById('edit-profile-modal').style.display = 'flex';
        }

        function closeEditProfile() {
            document.getElementById('edit-profile-modal').style.display = 'none';
        }

        document.getElementById('edit-profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('edit-first').value;
            const lastName = document.getElementById('edit-last').value;
            const phone = document.getElementById('edit-phone').value;

            try {
                const response = await api.put('/customer/profile', { firstName, lastName, phone });
                
                // Update local storage
                const user = JSON.parse(localStorage.getItem('lollys_user'));
                user.name = `${firstName} ${lastName}`;
                user.phone = phone;
                localStorage.setItem('lollys_user', JSON.stringify(user));
                
                alert('Profile updated successfully');
                closeEditProfile();
                location.reload();
            } catch (err) {
                alert('Failed to update profile');
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('lollys_user'));
            if (!user) window.location.href = 'login.html';
            
            document.getElementById('user-welcome').textContent = `Welcome back, ${user.name.split(' ')[0]}`;
            
            document.getElementById('profile-details').innerHTML = `
                <p style="margin-bottom: 10px;"><strong>Email:</strong> ${user.email}</p>
                <p style="margin-bottom: 10px;"><strong>Phone:</strong> ${user.phone}</p>
            `;

            try {
                const orders = await api.get('/customer/orders');
                const tbody = document.getElementById('user-orders-body');
                if (orders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 40px;">No orders yet. <a href="menu.html" style="color: var(--accent-orange);">Order Now</a></td></tr>`;
                } else {
                    orders.forEach(order => {
                        tbody.innerHTML += `
                            <tr>
                                <td style="font-weight: 700;">${order.order_number}</td>
                                <td>${new Date(order.created_at).toLocaleDateString()}</td>
                                <td>R${parseFloat(order.total_amount).toFixed(2)}</td>
                                <td><span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span></td>
                            </tr>
                        `;
                    });
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
