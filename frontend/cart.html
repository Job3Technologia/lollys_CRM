<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Lolly's Food Joint</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo">
                <img src="../lollys logo.jpg" alt="Lolly's Logo">
                <h1>Lolly's Food Joint</h1>
                <div class="uber-eats-badge">
                    <i class="fas fa-motorcycle"></i> Available on Uber Eats
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
                <li id="auth-btn"><a href="login.html" class="btn btn-login">Login</a></li>
            </ul>
            <div class="burger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="container" style="padding: 150px 20px;">
        <h1 style="margin-bottom: 30px;">Your <span style="color: var(--accent-orange);">Cart</span></h1>
        
        <div id="cart-content" class="grid-2" style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
            <div id="cart-items" class="glass-panel" style="padding: 20px;">
                <!-- Items will be loaded here -->
            </div>
            
            <div id="cart-summary" class="glass-panel" style="padding: 30px; height: fit-content;">
                <h3>Order Summary</h3>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--glass-border);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Subtotal</span>
                    <span id="subtotal">R0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Service Fee</span>
                    <span>R5.00</span>
                </div>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--glass-border);">
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem; margin-bottom: 30px;">
                    <span>Total</span>
                    <span id="total">R5.00</span>
                </div>
                <a href="checkout.html" class="btn btn-primary" style="width: 100%;">Proceed to Checkout</a>
            </div>
        </div>
        
        <div id="empty-cart" style="display: none; text-align: center; padding: 100px 0;">
            <i class="fas fa-shopping-basket" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 20px;"></i>
            <h2>Your cart is empty</h2>
            <p style="margin-bottom: 30px;">Looks like you haven't added anything yet.</p>
            <a href="menu.html" class="btn btn-primary">Go to Menu</a>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script>
        function renderCartPage() {
            const itemsContainer = document.getElementById('cart-items');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');
            const content = document.getElementById('cart-content');
            const empty = document.getElementById('empty-cart');

            if (cart.length === 0) {
                content.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            content.style.display = 'grid';
            empty.style.display = 'none';
            itemsContainer.innerHTML = '';
            
            let subtotal = getCartTotal();

            cart.forEach(item => {
                itemsContainer.innerHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--glass-border);">
                        <div>
                            <h4>${item.name}</h4>
                            <p style="color: var(--accent-orange); font-weight: 500;">R${item.price.toFixed(2)}</p>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div style="display: flex; align-items: center; background: var(--secondary-white); border: 1px solid var(--glass-border); border-radius: 8px; padding: 5px;">
                                <button onclick="updateItemQuantity(${item.id}, -1)" style="background: none; border: none; color: var(--text-dark); cursor: pointer; padding: 5px 10px;">-</button>
                                <span style="margin: 0 10px; font-weight: 600;">${item.quantity}</span>
                                <button onclick="updateItemQuantity(${item.id}, 1)" style="background: none; border: none; color: var(--text-dark); cursor: pointer; padding: 5px 10px;">+</button>
                            </div>
                            <span style="font-weight: 600; min-width: 80px; text-align: right;">R${(item.price * item.quantity).toFixed(2)}</span>
                            <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: var(--error); cursor: pointer; margin-left: 10px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            subtotalEl.textContent = `R${subtotal.toFixed(2)}`;
            totalEl.textContent = `R${(subtotal + 5).toFixed(2)}`;
        }

        // Listen for updates from other parts of the app
        window.addEventListener('cart-updated', renderCartPage);
        document.addEventListener('DOMContentLoaded', renderCartPage);
    </script>
</body>
</html>
